name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    if: ${{ !contains(github.server_url, 'github.com') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update manifest version
        run: |
          VERSION_NO="${{ steps.version.outputs.VERSION }}"
          VERSION_NO="${VERSION_NO#v}"
          python3 .github/scripts/update_hacs_manifest.py --version "$VERSION_NO"

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "actions@forgejo.keynet.ovh"
          git fetch origin master
          git rebase origin/master
          git add custom_components/myorlen_gas_sensor/manifest.json
          git commit -m "chore: bump manifest version to ${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:master

      - name: Create zip
        run: |
          cd custom_components/myorlen_gas_sensor
          zip -r myorlen_gas_sensor.zip ./

      - name: Create Forgejo Release
        env:
          FORGEJO_TOKEN: ${{ github.token }}
        run: |
          VERSION_NO="${{ steps.version.outputs.VERSION }}"
          VERSION_NO="${VERSION_NO#v}"
          BODY=$(awk "/^## \[$VERSION_NO\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md | jq -Rs .)
          RESPONSE=$(curl -s -X POST \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${{ steps.version.outputs.VERSION }}\", \"name\": \"myORLEN Gas Sensor ${{ steps.version.outputs.VERSION }}\", \"body\": $BODY}")
          RELEASE_ID=$(echo $RESPONSE | jq -r '.id')
          curl -s -X POST \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -F "attachment=@custom_components/myorlen_gas_sensor/myorlen_gas_sensor.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION_NO="${{ steps.version.outputs.VERSION }}"
          VERSION_NO="${VERSION_NO#v}"
          BODY=$(awk "/^## \[$VERSION_NO\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md | jq -Rs .)
          RESPONSE=$(curl -s -X POST \
            "https://api.github.com/repos/keysim86/myORLEN-Gas-Sensor/releases" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${{ steps.version.outputs.VERSION }}\", \"target_commitish\": \"master\", \"name\": \"myORLEN Gas Sensor ${{ steps.version.outputs.VERSION }}\", \"body\": $BODY}")
          echo "GitHub API response: $RESPONSE"
          RELEASE_ID=$(echo $RESPONSE | jq -r '.id')
          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "ERROR: Failed to create GitHub release"
            exit 1
          fi
          curl -s -X POST \
            "https://uploads.github.com/repos/keysim86/myORLEN-Gas-Sensor/releases/$RELEASE_ID/assets?name=myorlen_gas_sensor.zip" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary "@custom_components/myorlen_gas_sensor/myorlen_gas_sensor.zip"
